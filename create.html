<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Token — EVOZX Ultimate Factory</title>

  <link rel="stylesheet" href="../css/design-tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/layout.css" />
</head>
<body>

  <header class="navbar" id="navbar">
    <div class="container navbar__inner">
      <a href="../index.html" class="navbar__brand">
        <div class="navbar__logo-mark"><img src="../assets/img/logo-evozx.png" alt="EVOZX Logo" width="32" height="32" /></div>
        <span class="navbar__brand-text">EVOZX <span class="navbar__brand-accent">Labs</span></span>
      </a>

      <nav class="navbar__nav" id="mainNav">
        <a href="../index.html" class="nav-link" data-page="home">Home</a>
        <a href="create.html" class="nav-link active" data-page="create">Create Token</a>
        <a href="explore.html" class="nav-link" data-page="explore">Explore</a>
        <a href="my-tokens.html" class="nav-link" data-page="my-tokens">My Tokens</a>
        <a href="verification.html" class="nav-link" data-page="verification">Verification</a>
      </nav>

      <div class="navbar__actions">
        <div class="network-badge" id="networkBadge">
          <span class="network-badge__dot"></span>
          <span class="network-badge__label" id="networkLabel">EVOZ Mainnet</span>
        </div>
        <button class="btn btn--connect" id="connectWalletBtn" type="button">Connect Wallet</button>
        <button class="navbar__hamburger" id="hamburgerBtn" type="button" aria-label="Toggle menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <main class="page-wrapper">
    <div class="container">
      
      <div class="section-header" style="text-align: left; margin-bottom: var(--space-8);">
        <p class="section-eyebrow">Token Launchpad</p>
        <h1 class="section-title">Create Token</h1>
        <p class="section-subtitle">Deploy your custom ERC-20 token to EVOZ Mainnet.</p>
      </div>

      <div class="feature-card" style="max-width: 500px; margin: 0;">
        <form id="createTokenForm" novalidate>
          <div class="form-group">
            <label for="tokenName">Token Name</label>
            <input type="text" id="tokenName" name="Token Name" placeholder="e.g. Satoshi Gold" required>
          </div>
          
          <div class="form-group">
            <label for="tokenSymbol">Token Symbol</label>
            <input type="text" id="tokenSymbol" name="Token Symbol" placeholder="e.g. SGLD" required>
          </div>

          <div class="form-group">
            <label for="tokenSupply">Initial Supply</label>
            <input type="number" id="tokenSupply" name="Initial Supply" placeholder="1000000" required>
          </div>

          <div class="fee-card">
            <span>Deployment Fee</span>
            <strong id="feeDisplay">0.00 EVOZX</strong>
          </div>

          <button type="submit" class="btn btn--primary" id="deployBtn" style="width: 100%;">
            Deploy Token
          </button>
        </form>
      </div>

    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
  
  <script src="../js/modules/nav.js"></script>
  <script src="../js/modules/toast.js"></script>
  
  <script type="module" src="../js/pages/create.js"></script>
</body>
</html>
