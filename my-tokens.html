<!DOCTYPE html>

<head>

  <title>My Tokens — EVOZX Ultimate Factory</title>

  <link rel="stylesheet" href="../css/design-tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />

</head>
<body>

  <header class="navbar" id="navbar">
    <div class="container navbar__inner">
      <a href="../index.html" class="navbar__brand">
        <div class="navbar__logo-mark"><img src="../assets/img/logo-evozx.png" alt="EVOZX Logo" width="32" height="32" /></div>
        <span class="navbar__brand-text">EVOZX <span class="navbar__brand-accent">Labs</span></span>
      </a>

      <nav class="navbar__nav" id="mainNav">
        <a href="../index.html" class="nav-link" data-page="home">Home</a>

      <div id="myTokenGrid" class="feature-grid">
        <p id="statusMsg">Please connect your wallet to view your tokens.</p>

  <div class="toast-container" id="toastContainer"></div>
