<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Token — EVOZX Ultimate Factory</title>
  <link rel="stylesheet" href="../css/design-tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/layout.css" />
</head>
<body>

  <header class="navbar" id="navbar">...</header> 

  <main class="page-wrapper">
    <div class="container">
      
      <div class="section-header" style="text-align: left; margin-bottom: var(--space-8);">
        <p class="section-eyebrow">Phase 3</p>
        <h1 class="section-title">Create Token</h1>
        <p class="section-subtitle">Deploy your custom ERC-20 token to EVOZ Mainnet.</p>
      </div>

      <div class="feature-card" style="max-width: 500px; margin: 0;">
        <form id="createTokenForm">
          <div class="form-group">
            <label for="tokenName">Token Name</label>
            <input type="text" id="tokenName" placeholder="e.g. Satoshi Gold" required>
          </div>
          
          <div class="form-group">
            <label for="tokenSymbol">Token Symbol</label>
            <input type="text" id="tokenSymbol" placeholder="e.g. SGLD" required>
          </div>

          <div class="form-group">
            <label for="tokenSupply">Initial Supply</label>
            <input type="number" id="tokenSupply" placeholder="1000000" required>
          </div>

          <div class="fee-card">
            <span>Deployment Fee</span>
            <strong id="feeDisplay">0.00 EVOZX</strong>
          </div>

          <button type="submit" class="btn btn--primary" id="deployBtn" style="width: 100%;">
            Deploy Token
          </button>
        </form>
      </div>

    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
  <script src="../js/core/config.js"></script>
  <script src="../js/core/wallet.js"></script>
  <script src="../js/core/contract.js"></script>
  <script src="../js/modules/nav.js"></script>
  <script src="../js/modules/toast.js"></script>
  <script src="../js/pages/create.js"></script>
</body>
</html>
