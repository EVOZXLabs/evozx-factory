<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verification — EVOZX Ultimate Factory</title>

  <link rel="stylesheet" href="../css/design-tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/layout.css" />
</head>
<body>

  <header class="navbar" id="navbar">
    <div class="container navbar__inner">
      <a href="../index.html" class="navbar__brand">
        <div class="navbar__logo-mark"><img src="../assets/img/logo-evozx.png" alt="EVOZX Logo" width="32" height="32" /></div>
        <span class="navbar__brand-text">EVOZX <span class="navbar__brand-accent">Labs</span></span>
      </a>

      <nav class="navbar__nav" id="mainNav">
        <a href="../index.html" class="nav-link" data-page="home">Home</a>
        <a href="create.html" class="nav-link" data-page="create">Create Token</a>
        <a href="explore.html" class="nav-link" data-page="explore">Explore</a>
        <a href="my-tokens.html" class="nav-link" data-page="my-tokens">My Tokens</a>
        <a href="verification.html" class="nav-link active" data-page="verification">Verification</a>
      </nav>

      <div class="navbar__actions">
        <button class="btn btn--connect" id="connectWalletBtn" type="button">Connect Wallet</button>
      </div>
    </div>
  </header>

  <main class="page-wrapper">
    <div class="container">
      <div class="section-header" style="text-align: left; margin-bottom: var(--space-8);">
        <p class="section-eyebrow">Trust & Security</p>
        <h1 class="section-title">Verify Token</h1>
        <p class="section-subtitle">Submit your token address for verification and indexing.</p>
      </div>

      <div class="feature-card" style="max-width: 500px; margin: 0;">
        <form id="verifyForm" novalidate>
          <div class="form-group">
            <label for="tokenAddress">Token Contract Address</label>
            <input type="text" id="tokenAddress" placeholder="0x..." required>
          </div>
          
          <button type="submit" class="btn btn--primary" id="verifyBtn" style="width: 100%;">
            Request Verification
          </button>
        </form>
        <div id="verifyResult" style="margin-top: var(--space-4);"></div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
  <script src="../js/modules/nav.js"></script>
  <script src="../js/modules/toast.js"></script>
  <script type="module" src="../js/pages/verification.js"></script>
</body>
</html>
